<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Admin Dashboard | Importadora Quevedo LLC</title>
    <link rel="stylesheet" href="/vendor/bootstrap/css/bootstrap.min.css" />
    <link rel="stylesheet" href="/vendor/bootstrap-icons/bootstrap-icons.css" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="admin-body">
    <nav class="navbar navbar-expand-lg sticky-top">
      <div class="container">
        <a class="navbar-brand d-flex align-items-center gap-2" href="/">
          <img src="/assets/logo.webp" alt="Importadora Quevedo LLC logo" />
        </a>
        <div class="nav-actions">
          <a class="btn btn-outline-dark btn-sm" href="/">
            <i class="bi bi-shop"></i>
            Store
          </a>
          <button class="btn btn-dark btn-sm" id="logoutButton" type="button">
            <i class="bi bi-box-arrow-right"></i>
            Logout
          </button>
        </div>
      </div>
    </nav>

    <main class="container py-5">
      <div class="admin-header">
        <div>
          <p class="eyebrow">Orders</p>
          <h1>Incoming orders</h1>
        </div>
        <div class="admin-stat">
          <span id="dbMode">Loading</span>
          <strong id="orderCount">0</strong>
          <small>orders</small>
        </div>
      </div>
      <section class="order-card manual-order-card">
        <div class="checkout-card-head">
          <div>
            <p class="eyebrow">Manual payment</p>
            <h2>Add bank transfer order</h2>
          </div>
          <i class="bi bi-receipt"></i>
        </div>
        <form id="manualOrderForm" class="row g-3">
          <div class="col-md-6">
            <label class="form-label" for="manualFullName">Customer / payer name</label>
            <input class="form-control" id="manualFullName" name="fullName" placeholder="Customer full name" required />
          </div>
          <div class="col-md-3">
            <label class="form-label" for="manualPhone">Phone</label>
            <input class="form-control" id="manualPhone" name="phone" placeholder="Not provided" />
          </div>
          <div class="col-md-3">
            <label class="form-label" for="manualEmail">Email</label>
            <input class="form-control" id="manualEmail" name="email" type="email" placeholder="optional@email.com" />
          </div>
          <div class="col-md-4">
            <label class="form-label" for="manualDate">Payment date</label>
            <input class="form-control" id="manualDate" name="paymentDate" type="date" required />
          </div>
          <div class="col-md-4">
            <label class="form-label" for="manualTotal">Total USD</label>
            <input class="form-control" id="manualTotal" name="total" type="number" min="1" step="0.01" placeholder="1500" required />
          </div>
          <div class="col-md-8">
            <label class="form-label" for="manualProduct">Product / order detail</label>
            <input class="form-control" id="manualProduct" name="productName" placeholder="Premium kitchen order - paid transfer" />
          </div>
          <div class="col-md-6">
            <label class="form-label" for="manualAddress">Delivery address</label>
            <input class="form-control" id="manualAddress" name="address" placeholder="Bolivia - address pending" />
          </div>
          <div class="col-12">
            <label class="form-label" for="manualReference">Payment reference</label>
            <textarea class="form-control" id="manualReference" name="paymentReference" rows="2" placeholder="Bank transfer description or confirmation text"></textarea>
          </div>
          <div class="col-12">
            <label class="form-label" for="manualNotes">Admin notes</label>
            <textarea class="form-control" id="manualNotes" name="notes" rows="2" placeholder="Manual paid order imported from bank transfer screenshot."></textarea>
          </div>
          <div class="col-12">
            <button class="btn btn-primary" type="submit">
              <i class="bi bi-plus-circle"></i>
              Add paid order
            </button>
            <span id="manualOrderMessage" class="form-message ms-2"></span>
          </div>
        </form>
      </section>
      <section id="orders" class="orders-list mt-4"></section>
    </main>

    <script src="/admin.js"></script>
  </body>
</html>
