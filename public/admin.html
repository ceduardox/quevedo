<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Admin Dashboard | Importadora Quevedo LLC</title>
    <link rel="stylesheet" href="/vendor/bootstrap/css/bootstrap.min.css" />
    <link rel="stylesheet" href="/vendor/bootstrap-icons/bootstrap-icons.css" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="admin-body">
    <nav class="navbar navbar-expand-lg sticky-top">
      <div class="container">
        <a class="navbar-brand d-flex align-items-center gap-2" href="/">
          <img src="/media/logo_1757914521356--Bodoo3y.png" alt="Importadora Quevedo LLC logo" />
        </a>
        <div class="nav-actions">
          <a class="btn btn-outline-dark btn-sm" href="/">
            <i class="bi bi-shop"></i>
            Store
          </a>
          <button class="btn btn-dark btn-sm" id="logoutButton" type="button">
            <i class="bi bi-box-arrow-right"></i>
            Logout
          </button>
        </div>
      </div>
    </nav>

    <main class="container py-5">
      <div class="admin-header">
        <div>
          <p class="eyebrow">Orders</p>
          <h1>Incoming orders</h1>
        </div>
        <div class="admin-stat">
          <span id="dbMode">Loading</span>
          <strong id="orderCount">0</strong>
          <small>orders</small>
        </div>
      </div>
      <section id="orders" class="orders-list mt-4"></section>
    </main>

    <script src="/admin.js"></script>
  </body>
</html>
