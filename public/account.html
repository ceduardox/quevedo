<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>My Account | Importadora Quevedo LLC</title>
    <link rel="stylesheet" href="/vendor/bootstrap/css/bootstrap.min.css" />
    <link rel="stylesheet" href="/vendor/bootstrap-icons/bootstrap-icons.css" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="admin-body">
    <nav class="navbar navbar-expand-lg sticky-top">
      <div class="container">
        <a class="navbar-brand d-flex align-items-center gap-2" href="/">
          <img src="/assets/logo.webp" alt="Importadora Quevedo LLC logo" />
        </a>
        <div class="nav-actions">
          <a class="btn btn-outline-dark btn-sm" href="/">Store</a>
          <button class="btn btn-dark btn-sm" id="logoutButton" type="button" hidden>Logout</button>
        </div>
      </div>
    </nav>

    <main class="container py-5">
      <div class="admin-header">
        <div>
          <p class="eyebrow">Customer area</p>
          <h1>My account</h1>
        </div>
      </div>

      <section id="loginPanel" class="login-card account-card">
        <h2>Login to view your orders</h2>
        <form id="accountLoginForm" class="mt-3">
          <label class="form-label" for="email">Email</label>
          <input class="form-control mb-3" id="email" name="email" type="email" placeholder="Email" required />
          <label class="form-label" for="password">Password</label>
          <input class="form-control mb-3" id="password" name="password" type="password" placeholder="Password" required />
          <button class="btn btn-primary w-100" type="submit">Login</button>
          <div id="loginMessage" class="form-message mt-3"></div>
        </form>
      </section>

      <section id="ordersPanel" hidden>
        <div id="accountOrders" class="orders-list"></div>
      </section>
    </main>

    <script src="/account.js"></script>
  </body>
</html>
